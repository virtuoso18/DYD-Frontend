     <style>
      .a-enter-ar-button {
        /* remove all inline styles */
        width: 200px !important;
        position: fixed !important;
        bottom: 3px !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        padding: 15px 20px !important;
        font-size: 18px !important;
        font-weight: 600 !important;
        letter-spacing: 1px !important;
        font-family: "Orbitron", sans-serif !important;
        text-align: center;
        color: #00eaff !important;
        background: rgba(0, 10, 20, 0.9) !important;
        border: 2px solid #00eaff !important;
        border-radius: 12px !important;
        text-shadow: 0 0 8px #00eaff !important;
        box-shadow: 0 0 20px rgba(0, 238, 255, 0.4),
          inset 0 0 10px rgba(0, 238, 255, 0.3) !important;
        transition: 0.25s ease !important;
        cursor: pointer !important;
        z-index: 999999 !important;
        position: fixed;
        width: 100px;
        height: 50px;
      }

      .a-enter-ar-button::after {
        content: "Start AR";
      }
      .a-enter-vr-button {
        display: none;
      }

      .a-enter-ar-button :hover {
        color: #ffffff !important;
        background: rgba(0, 238, 255, 0.15) !important;
        box-shadow: 0 0 30px rgba(0, 238, 255, 0.6),
          inset 0 0 15px rgba(0, 238, 255, 0.4) !important;
        border-color: #ffffff !important;
      }
      .ant-drawer-content-wrapper{
        position: relative;
        left: -16px;
      }
      html, body {
        background-color: #FFFFFF !important;
        color: black !important;
        font-family:var( --font-family-main)  !important;
      }
    </style>
